<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Event Calendar — View all college events by month and track your registrations on the College Event Attendance Tracker.">
  <title>Event Calendar — College Event Attendance Tracker</title>
  <!-- Fix #22: Emoji favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../public/css/components.css">
  <link rel="stylesheet" href="../public/css/calendar.css">
  <link rel="stylesheet" href="../public/css/responsive.css">
</head>

<body class="page-enter">

  <!-- TOPBAR -->
  <div class="topbar">
    <a href="student-dashboard.html" class="back-btn-nav">
      <span>← Back</span>
    </a>
    <!-- Fix #19: aria-hidden on decorative emoji -->
    <div class="logo"><span aria-hidden="true">🎓</span> Event Attendance Tracker</div>

    <!-- Desktop navigation -->
    <div class="top-actions">
      <span class="nav-link active">Calendar</span>
      <a href="attendance.html" class="nav-link">My Attendance</a>
      <a href="profile.html" class="nav-link">Profile</a>
      <span class="role-badge">Student</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- Hamburger button (mobile only) -->
    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle navigation" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

    <!-- Mobile navigation panel -->
    <nav class="mobile-nav" aria-label="Mobile navigation">
      <a href="student-dashboard.html" class="nav-link">Dashboard</a>
      <span class="nav-link active">Calendar</span>
      <a href="attendance.html" class="nav-link">My Attendance</a>
      <a href="profile.html" class="nav-link">Profile</a>
      <div class="mobile-nav-sep"></div>
      <span class="role-badge">Student</span>
      <div class="mobile-nav-sep"></div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>
  </div>


  <div class="calendar-wrapper">

    <div class="cal-page-header">
      <div>
        <h2>Event Calendar</h2>
        <p>View all college events by month. Outlined chips = you're registered.</p>
      </div>
      <div class="cal-legend">
        <div class="legend-item"><span class="legend-dot dot-tech"></span> Tech</div>
        <div class="legend-item"><span class="legend-dot dot-nontech"></span> Non-Tech</div>
        <div class="legend-item"><span class="legend-dot dot-sports"></span> Sports</div>
        <div class="legend-item"><span class="legend-dot dot-cultural"></span> Yugantar</div>
        <div class="legend-item"><span class="legend-dot dot-other"></span> Gyanotsav</div>
      </div>
    </div>


    <div class="calendar-card">

      <!-- Month navigation -->
      <div class="cal-header">
        <div class="cal-nav-group">
          <button class="cal-nav-btn" onclick="changeMonth(-1)" aria-label="Previous month">&#8249;</button>
          <button class="cal-nav-btn" onclick="changeMonth(1)" aria-label="Next month">&#8250;</button>
        </div>
        <span class="cal-month-title" id="calMonthTitle">Loading...</span>
        <button class="cal-today-btn" onclick="goToToday()">Today</button>
      </div>

      <!-- Day of week header -->
      <div class="cal-dow-row">
        <div class="cal-dow">Sun</div>
        <div class="cal-dow">Mon</div>
        <div class="cal-dow">Tue</div>
        <div class="cal-dow">Wed</div>
        <div class="cal-dow">Thu</div>
        <div class="cal-dow">Fri</div>
        <div class="cal-dow">Sat</div>
      </div>

      <!-- Day cells injected by JS -->
      <div class="cal-grid" id="calGrid"></div>

    </div>


    <!-- Event detail panel — shown when a day with events is clicked -->
    <div class="detail-panel" id="detailPanel" style="display:none">
      <div class="detail-header">
        <h3 id="detailTitle">Events</h3>
        <button class="detail-close" onclick="closeDetail()" aria-label="Close detail panel">✕</button>
      </div>
      <div class="detail-body" id="detailBody"></div>
    </div>

  </div>


  <!-- Fix #8/#10: Toast BEFORE scripts + aria-live -->
  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="../public/js/toast_utility.js"></script>
  <script src="../public/js/calendar.js"></script>
  <script src="../public/js/mobile-menu.js"></script>

</body>

</html>
