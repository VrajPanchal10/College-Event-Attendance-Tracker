<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Event Details — View full information and register for college events on the College Event Attendance Tracker.">
  <title>Event Details — College Event Attendance Tracker</title>
  <!-- Fix #22: Emoji favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../public/css/components.css">
  <link rel="stylesheet" href="../public/css/event-details.css">
  <link rel="stylesheet" href="../public/css/responsive.css">
</head>

<body class="page-enter">

  <div class="topbar">
    <div class="logo">Event Attendance Tracker</div>
    <div class="top-actions">
      <button class="logout-btn" onclick="goBack()">← Back to Dashboard</button>
    </div>
  </div>


  <div class="event-container">

    <!-- BANNER IMAGE — visible only when event has an image -->
    <div class="event-banner" id="eventBanner" style="display:none">
      <img id="bannerImg" src="" alt="Event Banner">
    </div>

    <h1 id="title"></h1>

    <div class="event-meta">
      <p><strong>Category:</strong> <span id="category"></span></p>
      <p><strong>Date:</strong>     <span id="date"></span></p>
      <p><strong>Venue:</strong>    <span id="venue"></span></p>
    </div>

    <div class="event-description">
      <h3>Description</h3>
      <p id="description"></p>
    </div>

    <div class="event-actions">
      <button class="primary-btn" onclick="registerEvent()">
        Register for Event
      </button>
    </div>

  </div>


  <div id="toast" class="toast"></div>

  <script src="../public/js/events.js"></script>

</body>

</html>
